name: chaos

on:
  schedule:
    # Nightly at 03:17 UTC.
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      duration:
        description: 'Soak duration (hh:mm:ss or seconds)'
        required: false
        default: '01:00:00'
      transport:
        description: 'Transport: tcp | tls | ws'
        required: false
        default: 'tcp'
      clients:
        description: 'Number of publisher/subscriber workers'
        required: false
        default: '4'
      scenario:
        description: 'Fault scenario (a single fault name, or "all")'
        required: false
        default: 'all'
      seed:
        description: 'RNG seed (blank = random; pass the logged seed to reproduce a failure)'
        required: false
        default: ''
  pull_request:
    branches: [main]
    paths:
      - 'src/Mqtt.Client/**'
      - 'tests/Mqtt.Client.ChaosTests/**'
      - '.github/workflows/chaos.yml'

permissions:
  contents: read

jobs:
  # Full nightly soak (default 1h) on a single transport, or an on-demand run.
  soak:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
      CI: 'true'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build chaos harness
        run: dotnet build tests/Mqtt.Client.ChaosTests/Mqtt.Client.ChaosTests.csproj -c Release

      - name: Run chaos soak
        env:
          DURATION: ${{ github.event.inputs.duration || '01:00:00' }}
          TRANSPORT: ${{ github.event.inputs.transport || 'tcp' }}
          CLIENTS: ${{ github.event.inputs.clients || '4' }}
          SCENARIO: ${{ github.event.inputs.scenario || 'all' }}
          SEED: ${{ github.event.inputs.seed || '' }}
        run: |
          set -o pipefail
          mkdir -p chaos-report
          dotnet run --project tests/Mqtt.Client.ChaosTests -c Release --no-build -- \
            --duration "$DURATION" --transport "$TRANSPORT" --clients "$CLIENTS" \
            --scenario "$SCENARIO" ${SEED:+--seed "$SEED"} --report ./chaos-report \
            2>&1 | tee "chaos-report/console-$TRANSPORT.log"

      - name: Upload chaos artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: chaos-soak-${{ github.run_id }}
          path: chaos-report/**

  # Short per-transport smoke on PRs so a regression in recovery/leak/hang is caught fast.
  smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        transport: [tcp, tls, ws]
    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
      CI: 'true'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build chaos harness
        run: dotnet build tests/Mqtt.Client.ChaosTests/Mqtt.Client.ChaosTests.csproj -c Release

      - name: Run chaos smoke (${{ matrix.transport }})
        run: |
          set -o pipefail
          mkdir -p chaos-report
          dotnet run --project tests/Mqtt.Client.ChaosTests -c Release --no-build -- \
            --duration 180 --transport ${{ matrix.transport }} --clients 3 \
            --report ./chaos-report 2>&1 | tee "chaos-report/console-${{ matrix.transport }}.log"

      - name: Upload chaos smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: chaos-smoke-${{ matrix.transport }}-${{ github.run_id }}
          path: chaos-report/**
