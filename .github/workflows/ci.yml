name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: build-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
      CI: 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore /warnaserror

      - name: Test (unit)
        shell: bash
        run: |
          dotnet build tests/Mqtt.Client.UnitTests/Mqtt.Client.UnitTests.csproj -c Release --no-restore
          for tfm in net8.0 net9.0 net10.0; do
            echo "=== Running unit tests on $tfm ==="
            ./tests/Mqtt.Client.UnitTests/bin/Release/$tfm/Mqtt.Client.UnitTests${{ runner.os == 'Windows' && '.exe' || '' }} --no-ansi --no-progress
          done

  aot:
    name: native-aot (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish AOT
        run: dotnet publish tests/Mqtt.Client.AotTests/Mqtt.Client.AotTests.csproj -c Release /warnaserror

      - name: Run AOT binary
        shell: bash
        run: |
          bin=$(find tests/Mqtt.Client.AotTests/bin/Release/net10.0 -type f -name 'Mqtt.Client.AotTests*' ! -name '*.pdb' ! -name '*.dll' ! -name '*.json' | head -n1)
          echo "Running $bin"
          "$bin"

  pack:
    name: pack-nupkg
    runs-on: ubuntu-latest
    needs: [build-test, aot]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet pack src/Mqtt.Client/Mqtt.Client.csproj -c Release -o ./nupkg
      - uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./nupkg/*.*nupkg
