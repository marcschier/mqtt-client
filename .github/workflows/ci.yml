name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: build-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
      CI: 'true'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore /warnaserror

      - name: Test (unit + api)
        shell: bash
        run: |
          ext="${{ runner.os == 'Windows' && '.exe' || '' }}"
          for proj in Mqtt.Client.UnitTests Mqtt.Client.ApiTests; do
            dotnet build "tests/$proj/$proj.csproj" -c Release --no-restore
            for tfm in net8.0 net9.0 net10.0; do
              echo "=== Running $proj on $tfm ==="
              "./tests/$proj/bin/Release/$tfm/$proj$ext" --no-ansi --no-progress
            done
          done

      - name: Test (Mqtt.Client.Testing broker)
        shell: bash
        run: |
          ext="${{ runner.os == 'Windows' && '.exe' || '' }}"
          proj=Mqtt.Client.Testing.Tests
          dotnet build "tests/$proj/$proj.csproj" -c Release --no-restore
          echo "=== Running $proj on net10.0 ==="
          "./tests/$proj/bin/Release/net10.0/$proj$ext" --no-ansi --no-progress

  aot:
    name: native-aot (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
      CI: 'true'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Publish unit tests (NativeAOT)
        run: dotnet publish tests/Mqtt.Client.UnitTests/Mqtt.Client.UnitTests.csproj -c Release -f net10.0 /warnaserror

      - name: Run AOT unit tests
        shell: bash
        run: |
          bin=$(find tests/Mqtt.Client.UnitTests/bin/Release/net10.0 -path '*/publish/*' -type f -name 'Mqtt.Client.UnitTests*' ! -name '*.pdb' ! -name '*.dll' ! -name '*.json' ! -name '*.dbg' | head -n1)
          echo "Running $bin"
          "$bin" --no-ansi --no-progress

  pack:
    name: pack-nupkg
    runs-on: ubuntu-latest
    needs: [build-test, aot]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - run: dotnet pack src/Mqtt.Client/Mqtt.Client.csproj -c Release -o ./nupkg
      - run: dotnet pack src/Mqtt.Client.Testing/Mqtt.Client.Testing.csproj -c Release -o ./nupkg
      - uses: actions/upload-artifact@v7
        with:
          name: nupkg
          path: ./nupkg/*.*nupkg
      - name: Attach packages to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" ./nupkg/*.nupkg ./nupkg/*.snupkg --clobber
