name: nuget

# Manually publish a release's NuGet package to nuget.org using OIDC-based
# trusted publishing (no long-lived API key). The package is NOT rebuilt here:
# it downloads the .nupkg/.snupkg already attached to a GitHub release (built
# and published by the `ci` workflow's pack job), so the exact bytes that were
# validated are what get pushed. Defaults to the latest release.
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish (blank = latest release)'
        required: false
        type: string

jobs:
  publish:
    name: publish-to-nuget
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write   # Required: OIDC token for NuGet trusted publishing
      contents: read    # Read release assets

    steps:
      - name: Download package from GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.release_tag }}
        run: |
          mkdir -p artifacts
          if [ -z "$TAG" ]; then
            TAG=$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName -q .tagName)
          fi
          echo "Publishing packages from release: $TAG"
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern '*.nupkg' --pattern '*.snupkg' --dir artifacts
          echo "Downloaded:"
          ls -l artifacts
          if [ -z "$(ls artifacts/*.nupkg 2>/dev/null)" ]; then
            echo "::error::No .nupkg found on release $TAG"
            exit 1
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: NuGet login (OIDC)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}   # nuget.org profile name (NOT email)

      - name: Push to nuget.org
        run: >-
          dotnet nuget push "artifacts/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
