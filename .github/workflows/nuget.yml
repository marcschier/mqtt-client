name: nuget

# Manually publish the latest NuGet package from the GitHub Packages feed
# (nuget.pkg.github.com) to nuget.org using OIDC-based trusted publishing (no
# long-lived API key). The package is NOT rebuilt: it pulls the latest version
# of Mqtt.Client already published to GitHub Packages (by the github-packages
# workflow) and pushes those exact bytes to nuget.org.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version to publish (blank = latest on GitHub Packages)'
        required: false
        type: string

jobs:
  publish:
    name: publish-to-nuget
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write   # Required: OIDC token for NuGet trusted publishing
      packages: read    # Read the package from the GitHub Packages feed

    steps:
      - name: Download latest package from GitHub Packages
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          ID="Mqtt.Client"
          IDL="$(echo "$ID" | tr '[:upper:]' '[:lower:]')"
          AUTH="Authorization: Bearer ${GH_TOKEN}"
          INDEX="https://nuget.pkg.github.com/${OWNER}/index.json"
          BASE="$(curl -sfSL -H "$AUTH" "$INDEX" \
            | jq -r '.resources[] | select(."@type"|startswith("PackageBaseAddress")) | ."@id"' \
            | head -n1)"
          BASE="${BASE%/}"
          echo "PackageBaseAddress: $BASE"
          if [ -n "$INPUT_VERSION" ]; then
            VER="$INPUT_VERSION"
          else
            VER="$(curl -sfSL -H "$AUTH" "$BASE/$IDL/index.json" \
              | jq -r '.versions[]' | sort -V | tail -n1)"
          fi
          echo "Publishing $ID $VER from GitHub Packages to nuget.org"
          mkdir -p artifacts
          curl -sfSL -H "$AUTH" -o "artifacts/$IDL.$VER.nupkg" \
            "$BASE/$IDL/$VER/$IDL.$VER.nupkg"
          ls -l artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: NuGet login (OIDC)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}   # nuget.org profile name (NOT email)

      - name: Push to nuget.org
        run: >-
          dotnet nuget push "artifacts/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
