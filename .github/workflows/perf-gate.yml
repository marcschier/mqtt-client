name: perf-gate

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/Mqtt.Client.Benchmarks/**'
      - 'scripts/perf-gate.ps1'
      - 'tests/Mqtt.Client.Benchmarks/perf-baseline.json'
      - '.github/workflows/perf-gate.yml'
  workflow_dispatch:
    inputs:
      tolerance:
        description: 'Allowed fractional allocation increase (default 0.10)'
        required: false
        default: '0.10'

permissions:
  contents: read

jobs:
  alloc-gate:
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
      CI: 'true'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run allocation regression gate
        shell: pwsh
        run: ./scripts/perf-gate.ps1 -Tolerance ${{ github.event.inputs.tolerance || '0.10' }}

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-gate-${{ github.run_id }}
          path: tests/Mqtt.Client.Benchmarks/BenchmarkDotNet.Artifacts/**
